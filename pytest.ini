[pytest]
# Pytest configuration for hierarchical-memory tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default arguments
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=hierarchical_memory
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multiple components)
    slow: Slow tests (should be run separately)

# Coverage options
[coverage:run]
source = hierarchical_memory
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2
